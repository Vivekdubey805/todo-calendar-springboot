<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #74ebd5, #9face6);
        }

        .container {
            background: white;
            padding: 35px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5848d8;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .footer-text a {
            color: #6c63ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form action="/users/register-form" method="post">
        <div class="input-group">
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="/login.html">Login</a>
    </div>
</div>

</body>
</html>
