<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #74ebd5, #9face6);
        }

        .container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            width: 400px;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.18);
            backdrop-filter: blur(12px);
            transition: 0.3s ease;
        }

        .container:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d0d7e2;
            border-radius: 12px;
            font-size: 15px;
            background: #f8faff;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6c63ff;
            box-shadow: 0 0 8px rgba(108,99,255,0.25);
            background: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #6c63ff, #5848d8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(108,99,255,0.35);
        }

        .footer-text {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
        .brand{
    text-align:center;
    font-size:20px;
    font-weight:700;
    color:#6c63ff;
    margin-bottom:15px;
}

.tagline{
    display:block;
    font-size:12px;
    color:#718096;
    font-weight:500;
    margin-top:4px;
}
    </style>
</head>
<body>
<div class="container">

    <!-- BRAND -->
    <div class="brand">
        🚀 Nathoasto Globel Tech
        <span class="tagline">Smart Productivity Platform</span>
    </div>

    <h2>Create Account ✨</h2>

    <form action="/users/register-form" method="post">
        <div class="input-group">
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="footer-text">
        Already have an account? <a href="/login.html">Login</a>
    </div>

</div>

</body>
</html>
